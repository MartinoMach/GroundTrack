<svg width="760" height="240" viewBox="0 0 760 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GroundTrack logo</title>
  <desc id="desc">A clean black, green, and purple GroundTrack wordmark with an orbital ground-station badge.</desc>
  <defs>
